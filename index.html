<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ryan Chester Magleo</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background-image: url('https://i.pinimg.com/originals/84/4b/56/844b5617fdad9cd08382311ca10abfba.gif');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .overlay {
      min-height: 100vh;
      background-color: rgba(0, 0, 0, 0.65);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 2rem;
    }

    .name-row {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .letter-box {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 58px;
      height: 58px;
      border: 3px solid rgba(255, 255, 255, 0.85);
      border-radius: 10px;
      font-family: 'Orbitron', monospace;
      font-size: 24px;
      font-weight: 700;
      color: #fff;
      animation: bounce 1.2s infinite ease-in-out;
      text-shadow: 0 0 10px currentColor;
      transition: background 0.3s;
      cursor: default;
    }

    .letter-box:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0) scale(1); }
      50%       { transform: translateY(-12px) scale(1.15); }
    }

    .divider {
      width: 60px;
      height: 3px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
      margin: 4px auto 16px;
    }

    /* RYAN */
    .row1 .letter-box:nth-child(1) { color: #ff4d4d; animation-delay: 0.0s; }
    .row1 .letter-box:nth-child(2) { color: #63e6be; animation-delay: 0.1s; }
    .row1 .letter-box:nth-child(3) { color: #74c0fc; animation-delay: 0.2s; }
    .row1 .letter-box:nth-child(4) { color: #fcc419; animation-delay: 0.3s; }

    /* CHESTER */
    .row2 .letter-box:nth-child(1) { color: #cc5de8; animation-delay: 0.0s; }
    .row2 .letter-box:nth-child(2) { color: #ff6b6b; animation-delay: 0.1s; }
    .row2 .letter-box:nth-child(3) { color: #74c0fc; animation-delay: 0.2s; }
    .row2 .letter-box:nth-child(4) { color: #63e6be; animation-delay: 0.3s; }
    .row2 .letter-box:nth-child(5) { color: #fcc419; animation-delay: 0.4s; }
    .row2 .letter-box:nth-child(6) { color: #f783ac; animation-delay: 0.5s; }
    .row2 .letter-box:nth-child(7) { color: #ff8787; animation-delay: 0.6s; }

    /* MAGLEO */
    .row3 .letter-box:nth-child(1) { color: #69db7c; animation-delay: 0.0s; }
    .row3 .letter-box:nth-child(2) { color: #4dabf7; animation-delay: 0.1s; }
    .row3 .letter-box:nth-child(3) { color: #ffa94d; animation-delay: 0.2s; }
    .row3 .letter-box:nth-child(4) { color: #f783ac; animation-delay: 0.3s; }
    .row3 .letter-box:nth-child(5) { color: #cc5de8; animation-delay: 0.4s; }
    .row3 .letter-box:nth-child(6) { color: #63e6be; animation-delay: 0.5s; }
  </style>
</head>
<body>
  <div class="overlay">

    <!-- RYAN -->
    <div class="name-row row1">
      <div class="letter-box">R</div>
      <div class="letter-box">Y</div>
      <div class="letter-box">A</div>
      <div class="letter-box">N</div>
    </div>

    <div class="divider"></div>

    <!-- CHESTER -->
    <div class="name-row row2">
      <div class="letter-box">C</div>
      <div class="letter-box">H</div>
      <div class="letter-box">E</div>
      <div class="letter-box">S</div>
      <div class="letter-box">T</div>
      <div class="letter-box">E</div>
      <div class="letter-box">R</div>
    </div>

    <div class="divider"></div>

    <!-- MAGLEO -->
    <div class="name-row row3">
      <div class="letter-box">M</div>
      <div class="letter-box">A</div>
      <div class="letter-box">G</div>
      <div class="letter-box">L</div>
      <div class="letter-box">E</div>
      <div class="letter-box">O</div>
    </div>

  </div>
</body>
</html>
